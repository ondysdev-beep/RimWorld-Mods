version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rimverse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__Database: "Host=db;Database=rimverse;Username=postgres;Password=postgres"
      Jwt__Secret: "RimVerse-Dev-Secret-Key-Change-In-Production-Min32Chars!"
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      - db

volumes:
  pgdata:
