app = "rimverse-server"
primary_region = "fra"

[build]
  dockerfile = "../infra/Dockerfile"
  build-target = ""

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
