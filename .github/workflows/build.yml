name: Build & Test RimVerse Server

on:
  push:
    branches: [main]
    paths: ['src/**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore src/RimVerse.slnx

      - name: Build
        run: dotnet build src/RimVerse.slnx --no-restore -c Release

      - name: Test
        run: dotnet test src/RimVerse.slnx --no-build -c Release --verbosity normal
